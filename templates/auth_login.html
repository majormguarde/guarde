{% extends "base.html" %}
{% block content %}
<section class="section-pad bg-surface">
  <div class="container" style="max-width: 680px;">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4 p-md-5">
        <h1 class="h4 fw-bold mb-4">Вход в личный кабинет</h1>
        <form method="post" action="{{ url_for('login', next=request.args.get('next')) }}">
          <div class="mb-3">
            <label class="form-label">Логин</label>
            <input class="form-control form-control-lg" name="username" autocomplete="username" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Пароль</label>
            <input class="form-control form-control-lg" name="password" type="password" autocomplete="current-password" required>
          </div>
          <div class="d-grid gap-2">
            <button class="btn btn-primary btn-lg" type="submit">Войти</button>
            <a class="btn btn-outline-secondary btn-lg" href="{{ url_for('register', next=request.args.get('next')) }}">Регистрация</a>
          </div>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
