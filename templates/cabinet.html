{% extends "base.html" %}
{% block content %}
<section class="section-pad bg-surface">
  <div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="h4 fw-bold mb-0">Мои заявки</h1>
      <a class="btn btn-primary" href="{{ url_for('index') }}#support">Новая заявка</a>
    </div>
    <div class="card border-0 shadow-sm">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th style="width: 120px;">ID</th>
              <th>Тема</th>
              <th style="width: 160px;">Статус</th>
              <th style="width: 200px;">Создано</th>
            </tr>
          </thead>
          <tbody>
            {% for m in messages %}
              <tr>
                <td>#{{ m.id }}</td>
                <td>{{ m.subject or '—' }}</td>
                <td>
                  <span class="badge text-bg-secondary">{{ m.status }}</span>
                </td>
                <td>{{ m.created_at.strftime('%Y-%m-%d %H:%M') }}</td>
              </tr>
            {% else %}
              <tr>
                <td colspan="4" class="text-center text-secondary py-5">Заявок пока нет</td>
              </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
{% endblock %}
