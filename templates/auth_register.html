{% extends "base.html" %}
{% block content %}
<section class="section-pad bg-surface">
  <div class="container" style="max-width: 760px;">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4 p-md-5">
        <h1 class="h4 fw-bold mb-4">Регистрация</h1>
        <p class="text-secondary">Укажите контакт для обратной связи: Telegram и/или WhatsApp. Минимальная длина пароля — 8 символов.</p>
        <form method="post" action="{{ url_for('register', next=request.args.get('next')) }}">
          <div class="row g-3">
            <div class="col-12 col-md-6">
              <label class="form-label">Логин</label>
              <input class="form-control form-control-lg" name="username" autocomplete="username" required>
            </div>
            <div class="col-12 col-md-6">
              <label class="form-label">Пароль</label>
              <input class="form-control form-control-lg" type="password" name="password" autocomplete="new-password" required>
            </div>
            <div class="col-12 col-md-6">
              <label class="form-label">Компания</label>
              <input class="form-control form-control-lg" name="company" autocomplete="organization">
            </div>
            <div class="col-12 col-md-6">
              <label class="form-label">Телефон(ы)</label>
              <input class="form-control form-control-lg" name="phone" autocomplete="tel">
            </div>
            <div class="col-12 col-md-6">
              <label class="form-label">Telegram</label>
              <input class="form-control form-control-lg" name="telegram" autocomplete="off" placeholder="@username или номер">
            </div>
            <div class="col-12 col-md-6">
              <label class="form-label">WhatsApp</label>
              <input class="form-control form-control-lg" name="whatsapp" autocomplete="off" placeholder="номер телефона">
            </div>
            <div class="col-12 d-grid">
              <button class="btn btn-primary btn-lg" type="submit">Зарегистрироваться</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
