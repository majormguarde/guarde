<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вход в админку</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-md-7 col-lg-5">
          <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
              <h1 class="h4 mb-3">Вход в админку</h1>
              {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                  {% for category, message in messages %}
                    <div class="alert alert-{{ category }}" role="alert">{{ message }}</div>
                  {% endfor %}
                {% endif %}
              {% endwith %}
              <form method="post" action="{{ url_for('admin_login_post', next=request.args.get('next')) }}">
                <div class="mb-3">
                  <label class="form-label">Логин</label>
                  <input class="form-control" name="username" autocomplete="username" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Пароль</label>
                  <input class="form-control" name="password" type="password" autocomplete="current-password" required>
                </div>
                <div class="d-flex align-items-center justify-content-between gap-3">
                  <button class="btn btn-primary" type="submit">Войти</button>
                  <a class="link-secondary small" href="{{ url_for('index') }}">Вернуться на сайт</a>
                </div>
              </form>
              <div class="mt-3 text-secondary small">
                Если админ ещё не создан: откройте <a href="{{ url_for('setup_get') }}">/setup</a> один раз и задайте логин/пароль.
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
