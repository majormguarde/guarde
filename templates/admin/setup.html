<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Создание администратора</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
          <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
              <h1 class="h4 mb-3">Создание администратора</h1>
              {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                  {% for category, message in messages %}
                    <div class="alert alert-{{ category }}" role="alert">{{ message }}</div>
                  {% endfor %}
                {% endif %}
              {% endwith %}
              <form method="post" action="{{ url_for('setup_post') }}">
                <div class="mb-3">
                  <label class="form-label">Логин</label>
                  <input class="form-control" name="username" autocomplete="username" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Пароль (минимум 8 символов)</label>
                  <input class="form-control" name="password" type="password" autocomplete="new-password" required>
                </div>
                <div class="d-flex align-items-center justify-content-between gap-3">
                  <button class="btn btn-primary" type="submit">Создать</button>
                  <a class="link-secondary small" href="{{ url_for('index') }}">На сайт</a>
                </div>
              </form>
            </div>
          </div>
          <div class="mt-3 text-secondary small">
            После создания администратора страница /setup станет недоступна.
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
